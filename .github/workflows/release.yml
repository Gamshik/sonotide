name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-package-release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Validate tag version against project files
        id: version
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart('v')

          $cmakeText = Get-Content CMakeLists.txt -Raw
          if ($cmakeText -notmatch 'project\(Sonotide VERSION ([0-9]+\.[0-9]+\.[0-9]+)') {
            throw "Failed to read project version from CMakeLists.txt."
          }
          $cmakeVersion = $Matches[1]

          $versionHeader = Get-Content include/sonotide/version.h -Raw
          if ($versionHeader -notmatch 'version_string = "([^"]+)"') {
            throw "Failed to read version_string from include/sonotide/version.h."
          }
          $headerVersion = $Matches[1]

          if ($tagVersion -ne $cmakeVersion) {
            throw "Tag version '$tagVersion' does not match CMake version '$cmakeVersion'."
          }
          if ($tagVersion -ne $headerVersion) {
            throw "Tag version '$tagVersion' does not match header version '$headerVersion'."
          }

          "version=$tagVersion" >> $env:GITHUB_OUTPUT

      - name: Configure release build
        run: cmake --preset ci-ninja-release

      - name: Build release binaries
        run: cmake --build --preset ci-ninja-release

      - name: Run release tests
        run: ctest --preset ci-ninja-release

      - name: Install release package tree
        run: cmake --install build/ci-ninja-release

      - name: Configure smoke consumer against installed package
        run: >
          cmake -S packaging/smoke-consumer
          -B build/smoke-consumer
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH=${{ github.workspace }}/build/install/ci-ninja-release

      - name: Build smoke consumer
        run: cmake --build build/smoke-consumer

      - name: Package release SDK archive
        id: package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $assetBaseName = "sonotide-$version-windows-msvc-x64-release"
          $packageRoot = Join-Path $PWD "build/release-package/$assetBaseName"
          $zipPath = Join-Path $PWD "build/$assetBaseName.zip"
          $checksumPath = Join-Path $PWD "build/$assetBaseName.zip.sha256"

          if (Test-Path $packageRoot) {
            Remove-Item $packageRoot -Recurse -Force
          }
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          if (Test-Path $checksumPath) {
            Remove-Item $checksumPath -Force
          }

          New-Item -ItemType Directory -Path $packageRoot -Force | Out-Null
          Copy-Item -Path "build/install/ci-ninja-release/*" -Destination $packageRoot -Recurse
          Compress-Archive -Path $packageRoot -DestinationPath $zipPath -Force

          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path $checksumPath -Value "$hash  $assetBaseName.zip"

          "asset_name=$assetBaseName.zip" >> $env:GITHUB_OUTPUT
          "asset_path=$zipPath" >> $env:GITHUB_OUTPUT
          "checksum_name=$assetBaseName.zip.sha256" >> $env:GITHUB_OUTPUT
          "checksum_path=$checksumPath" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Sonotide v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.asset_path }}
            ${{ steps.package.outputs.checksum_path }}
